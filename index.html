<!doctype html>
<html lang="de" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>ISQ7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --font-d:"Outfit",system-ui,sans-serif;
  --font-b:"Inter",system-ui,sans-serif;
  --font-m:"JetBrains Mono",ui-monospace,monospace;
  --gold:#cba135;
  --green:#22c55e;
  --red:#ef4444;
  --blue:#3b82f6;
  --purple:#a855f7;
  --r:16px;
}
[data-theme="dark"]{
  color-scheme:dark;
  --bg:#0e0e10; --panel:rgba(255,255,255,0.04); --panel-border:rgba(255,255,255,0.08);
  --text:#f4f4f5; --muted:#a1a1aa; --dim:#71717a; --hover:rgba(255,255,255,0.06);
  --input:rgba(255,255,255,0.04);
}
[data-theme="light"]{
  color-scheme:light;
  --bg:#f8f7f3; --panel:rgba(255,255,255,0.85); --panel-border:rgba(28,25,20,0.1);
  --text:#17161c; --muted:#52525b; --dim:#8a8a93; --hover:rgba(28,25,20,0.04);
  --input:rgba(28,25,20,0.04);
  --gold:#b58a1a;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
html{font-family:var(--font-b);background:var(--bg);color:var(--text);transition:background .3s, color .3s;font-size:15px;line-height:1.5}
body{min-height:100vh;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:var(--font-d);font-weight:700;letter-spacing:-.01em;margin:0}
.mono{font-family:var(--font-m);font-variant-numeric:tabular-nums}

.nav{display:flex;align-items:center;gap:8px;padding:14px 32px;border-bottom:1px solid var(--panel-border);background:var(--bg);position:sticky;top:0;z-index:20}
.logo{font-family:var(--font-d);font-weight:700;font-size:17px;margin-right:24px;display:flex;align-items:center;gap:9px;letter-spacing:-.01em}
.logo .mark{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,color-mix(in srgb,var(--gold) 100%,transparent),color-mix(in srgb,var(--gold) 75%,#000));display:grid;place-items:center;box-shadow:0 1px 0 rgba(255,255,255,.18) inset,0 2px 8px color-mix(in srgb,var(--gold) 30%,transparent);position:relative;overflow:hidden}
.logo .mark::after{content:"";position:absolute;inset:0;border-radius:inherit;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.28),transparent 55%);pointer-events:none}
.logo .mark svg{position:relative;z-index:1}
.steps{display:flex;gap:4px;flex:1;overflow-x:auto}
.step{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:999px;font-size:13px;color:var(--muted);cursor:pointer;background:transparent;border:0;font-family:inherit;white-space:nowrap}
.step:hover{color:var(--text);background:var(--hover)}
.step.active{background:color-mix(in srgb,var(--gold) 14%,transparent);color:var(--gold)}
.step.disabled{opacity:.35;cursor:not-allowed}
.step.disabled:hover{background:transparent}
.tgl{width:34px;height:34px;border:1px solid var(--panel-border);background:transparent;border-radius:10px;cursor:pointer;color:var(--muted);display:grid;place-items:center}
.tgl:hover{color:var(--text)}
.tgl.active{color:var(--gold);background:color-mix(in srgb,var(--gold) 12%,transparent);border-color:color-mix(in srgb,var(--gold) 30%,var(--panel-border))}

.wrap{max-width:960px;margin:0 auto;padding:56px 32px 80px}
.eyebrow{font-family:var(--font-m);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-bottom:14px}
h1.title{font-size:40px;letter-spacing:-.025em;line-height:1.1}
.lede{color:var(--muted);font-size:16px;margin-top:10px;max-width:640px}

.card{background:var(--panel);border:1px solid var(--panel-border);border-radius:var(--r);padding:24px;backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%)}
.card + .card{margin-top:12px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:500;border:1px solid var(--panel-border);background:transparent;color:var(--text);cursor:pointer;transition:background .15s,transform .1s}
.btn:hover{background:var(--hover)}
.btn:active{transform:scale(.98)}
.btn:focus{outline:none}
.btn:focus-visible{box-shadow:0 0 0 3px color-mix(in srgb,var(--gold) 35%,transparent)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.primary{background:var(--gold);color:#1a1405;border-color:transparent;font-weight:600}
.btn.primary:hover:not(:disabled){background:var(--gold);filter:brightness(1.08)}
.btn.green{background:var(--green);color:#0a2614;border-color:transparent;font-weight:600}
.btn.green:hover:not(:disabled){background:var(--green);filter:brightness(1.08)}
.btn.big{padding:14px 24px;font-size:15px}
.btn.sm{padding:8px 14px;font-size:13px;border-radius:10px}

.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-family:var(--font-m);background:var(--input);color:var(--muted)}
.pill.gold{background:color-mix(in srgb,var(--gold) 15%,transparent);color:var(--gold)}
.pill.green{background:color-mix(in srgb,var(--green) 15%,transparent);color:var(--green)}
.pill.red{background:color-mix(in srgb,var(--red) 15%,transparent);color:var(--red)}
.pill.blue{background:color-mix(in srgb,var(--blue) 15%,transparent);color:var(--blue)}
.pill.purple{background:color-mix(in srgb,var(--purple) 15%,transparent);color:var(--purple)}
.pill.vip{background:linear-gradient(135deg,color-mix(in srgb,var(--gold) 22%,transparent),color-mix(in srgb,var(--purple) 20%,transparent));color:var(--gold);border:1px solid color-mix(in srgb,var(--gold) 35%,transparent);letter-spacing:.08em;text-transform:uppercase;font-weight:600}

/* VIP banner on inquiry detail */
.vip-banner{display:flex;gap:14px;align-items:flex-start;padding:18px 20px;margin-top:28px;border-radius:14px;background:linear-gradient(135deg,color-mix(in srgb,var(--gold) 10%,var(--card)) ,color-mix(in srgb,var(--purple) 8%,var(--card)));border:1px solid color-mix(in srgb,var(--gold) 28%,var(--panel-border))}
.vip-dot{width:10px;height:10px;border-radius:999px;background:var(--gold);margin-top:6px;box-shadow:0 0 0 4px color-mix(in srgb,var(--gold) 20%,transparent);animation:vip-pulse 2.4s ease-in-out infinite}
@keyframes vip-pulse{0%,100%{box-shadow:0 0 0 4px color-mix(in srgb,var(--gold) 20%,transparent)}50%{box-shadow:0 0 0 8px color-mix(in srgb,var(--gold) 6%,transparent)}}
.vip-note{color:var(--gold)!important}

/* Save-Version dirty-state: animated gold border that orbits */
.save-glow{position:relative;isolation:isolate;border-color:transparent!important;background:var(--card)}
.save-glow::before{content:"";position:absolute;inset:-1px;border-radius:inherit;padding:1.5px;background:conic-gradient(from var(--a,0deg),color-mix(in srgb,var(--gold) 90%,transparent) 0deg,color-mix(in srgb,var(--gold) 10%,transparent) 90deg,color-mix(in srgb,var(--gold) 90%,transparent) 180deg,color-mix(in srgb,var(--gold) 10%,transparent) 270deg,color-mix(in srgb,var(--gold) 90%,transparent) 360deg);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:orbit 3s linear infinite;z-index:-1}
.save-glow::after{content:"";position:absolute;inset:-4px;border-radius:inherit;background:radial-gradient(circle,color-mix(in srgb,var(--gold) 18%,transparent),transparent 70%);z-index:-2;opacity:.6;animation:glow-pulse 3s ease-in-out infinite}
@property --a{syntax:"<angle>";initial-value:0deg;inherits:false}
@keyframes orbit{to{--a:360deg}}
@keyframes glow-pulse{0%,100%{opacity:.4}50%{opacity:.7}}
.dot{width:6px;height:6px;border-radius:999px;background:currentColor;display:inline-block}

.list{display:flex;flex-direction:column}
.row{display:grid;grid-template-columns:1fr auto;gap:16px;padding:20px 0;border-bottom:1px solid var(--panel-border);cursor:pointer;align-items:center}
.row.detailed{padding:24px 0}
.row-meta{display:flex;gap:8px;margin-top:8px;font-family:var(--font-m);font-size:11px;color:var(--dim);flex-wrap:wrap;text-transform:uppercase;letter-spacing:.08em}
.row-meta .sep{opacity:.4}
.row-meta-right{text-align:right;font-size:12px;color:var(--muted);font-family:var(--font-m)}
.row-meta-right .d{color:var(--dim);margin-top:3px}

.more-toggle{background:transparent;border:1px solid var(--panel-border);color:var(--muted);padding:8px 14px;border-radius:999px;font-size:12px;font-family:var(--font-m);text-transform:uppercase;letter-spacing:.08em;cursor:pointer;white-space:nowrap;transition:all .15s}
.more-toggle:hover{color:var(--text);border-color:color-mix(in srgb,var(--gold) 40%,var(--panel-border))}

.arch-filters{display:flex;gap:8px;flex-wrap:wrap;margin-top:32px}
.filter-pill{background:transparent;border:1px solid var(--panel-border);color:var(--muted);padding:8px 16px;border-radius:999px;font-size:13px;font-family:var(--font-m);cursor:pointer;transition:all .15s}
.filter-pill:hover{color:var(--text);border-color:var(--panel-border)}
.filter-pill.active{background:color-mix(in srgb,var(--gold) 14%,transparent);color:var(--gold);border-color:color-mix(in srgb,var(--gold) 40%,var(--panel-border))}

/* Customer memory panel */
.memory-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:18px 0 6px;border-bottom:1px dashed var(--panel-border)}
.memory-stats .l{font-size:11px;color:var(--dim);font-family:var(--font-m);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.memory-stats .v{font-size:20px;font-weight:600}
.memory-stats .v.mono{font-family:var(--font-m)}
.memory-empty{display:flex;gap:14px;align-items:center;padding:16px 0 20px;border-bottom:1px dashed var(--panel-border)}
.new-badge{background:color-mix(in srgb,var(--blue) 16%,transparent);color:var(--blue);padding:8px 14px;border-radius:10px;font-family:var(--font-m);font-size:12px;font-weight:600;letter-spacing:.08em}
.ai-reason{margin-top:18px;padding:16px 18px;border-radius:12px;background:color-mix(in srgb,var(--gold) 6%,var(--input));border:1px solid color-mix(in srgb,var(--gold) 18%,var(--panel-border))}
.ai-reason-head{font-size:12px;color:var(--gold);font-family:var(--font-m);text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:6px;margin-bottom:8px}
.ai-reason-body{font-size:13px;line-height:1.65;color:var(--text)}
.mem-expand{background:transparent;border:0;color:var(--muted);padding:14px 0 4px;cursor:pointer;font-family:var(--font-m);font-size:13px;display:flex;align-items:center;gap:6px}
.mem-expand:hover{color:var(--text)}
.history{margin-top:6px}
.hist-row{display:grid;grid-template-columns:100px 1fr auto auto;gap:14px;padding:14px 0;border-top:1px dashed var(--panel-border);align-items:baseline;font-size:13px}
.hist-row .when{color:var(--muted);font-size:12px}
.hist-row .what{font-weight:500}
.hist-row .reason{grid-column:1/-1;color:var(--dim);font-size:12px;padding-left:114px;margin-top:-6px}

/* Archive detail — timeline, email, learnings */
.timeline{display:flex;flex-direction:column;padding:4px 0}
.tl-row{display:grid;grid-template-columns:120px 22px 1fr;gap:14px;padding:10px 0;align-items:center;position:relative}
.tl-row::before{content:"";position:absolute;left:131px;top:0;bottom:0;width:1px;background:var(--panel-border);z-index:0}
.tl-row:first-child::before{top:50%}
.tl-row:last-child::before{bottom:50%}
.tl-time{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;text-align:right}
.tl-dot{width:22px;height:22px;border-radius:999px;background:var(--card);border:1px solid var(--panel-border);display:grid;place-items:center;color:var(--muted);z-index:1;position:relative}
.tl-label{font-size:13.5px;line-height:1.5}
.tl-row.tl-gold .tl-dot{background:color-mix(in srgb,var(--gold) 18%,var(--card));border-color:color-mix(in srgb,var(--gold) 45%,var(--panel-border));color:var(--gold)}
.tl-row.tl-green .tl-dot{background:color-mix(in srgb,var(--green) 18%,var(--card));border-color:color-mix(in srgb,var(--green) 45%,var(--panel-border));color:var(--green)}
.tl-row.tl-green .tl-label{color:var(--green);font-weight:500}
.tl-row.tl-red .tl-dot{background:color-mix(in srgb,var(--red) 18%,var(--card));border-color:color-mix(in srgb,var(--red) 45%,var(--panel-border));color:var(--red)}
.tl-row.tl-red .tl-label{color:var(--red);font-weight:500}
.tl-row.tl-purple .tl-dot{background:color-mix(in srgb,var(--purple) 18%,var(--card));border-color:color-mix(in srgb,var(--purple) 45%,var(--panel-border));color:var(--purple)}
.tl-row.tl-blue .tl-dot{background:color-mix(in srgb,var(--blue) 18%,var(--card));border-color:color-mix(in srgb,var(--blue) 45%,var(--panel-border));color:var(--blue)}

.email-body{font-family:var(--font-b);font-size:13.5px;line-height:1.65;white-space:pre-wrap;word-wrap:break-word;padding:18px 20px;background:var(--input);border:1px solid var(--panel-border);border-radius:12px;color:var(--text);margin:0}

.learnings{display:flex;flex-direction:column;gap:2px}
.learning{display:grid;grid-template-columns:44px 1fr;gap:14px;padding:14px 0;border-top:1px dashed var(--panel-border);align-items:baseline;font-size:14px;line-height:1.6}
.learning:first-child{border-top:0}
.learning-num{color:var(--gold);font-size:12px;font-weight:600;padding-top:2px}
.row:last-child{border-bottom:0}
.row:hover .who{color:var(--gold)}
.who{font-weight:600;font-size:16px;transition:color .15s}
.what{color:var(--muted);font-size:13px;margin-top:4px}

.kv{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px dashed var(--panel-border);font-size:14px;gap:16px}
.kv:last-child{border-bottom:0}
.kv .k{color:var(--muted)}
.kv .v{font-family:var(--font-m);text-align:right}

.hero-num{font-family:var(--font-d);font-weight:700;font-size:88px;letter-spacing:-.03em;line-height:1;color:var(--gold)}
.hero-sub{color:var(--muted);margin-top:8px;font-size:14px}

.steps-v{display:flex;flex-direction:column;gap:0}
.sv{display:grid;grid-template-columns:32px 1fr auto;gap:16px;padding:14px 8px;align-items:center;border-bottom:1px dashed var(--panel-border);cursor:pointer;transition:background .15s;border-radius:8px;margin:0 -8px}
.sv:last-child{border-bottom:0}
.sv:hover{background:var(--hover)}
.sv.nc{cursor:default}
.sv.nc:hover{background:transparent}
.sv .c{width:22px;height:22px;border-radius:999px;border:1.5px solid var(--panel-border);display:grid;place-items:center;color:var(--dim);font-family:var(--font-m);font-size:11px;flex-shrink:0}
.sv.done .c{background:var(--green);border-color:var(--green);color:#0a2614}
.sv-exp{grid-column:1 / -1;margin-top:6px;padding:0 4px 10px 40px}
.sv-exp .panel{background:var(--input);border:1px solid var(--panel-border);border-radius:12px;padding:18px 20px;animation:slide .24s ease-out}
.email-head{display:grid;grid-template-columns:80px 1fr;gap:6px 14px;font-size:13px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px dashed var(--panel-border)}
.email-head .l{color:var(--dim);font-family:var(--font-m);font-size:11px;text-transform:uppercase;letter-spacing:.1em;padding-top:2px}
.email-body{font-size:14px;line-height:1.65;white-space:pre-wrap;color:var(--text)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}

.comp{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px dashed var(--panel-border)}
.comp:last-child{border-bottom:0}
.comp .name{flex:1;font-size:14px}
.comp .bar{flex:2;height:4px;background:var(--input);border-radius:999px;overflow:hidden;position:relative}
.comp .bar .f{position:absolute;inset:0;background:var(--gold);border-radius:999px;width:0;transition:width .8s cubic-bezier(.2,.8,.2,1)}
.comp.ours .name{color:var(--gold);font-weight:600}
.comp.ours .bar .f{background:var(--gold);height:100%;width:100%}
.comp .price{font-family:var(--font-m);font-size:14px;min-width:60px;text-align:right}

.big-check{width:80px;height:80px;border-radius:999px;background:color-mix(in srgb,var(--green) 18%,transparent);border:1px solid color-mix(in srgb,var(--green) 40%,transparent);color:var(--green);display:grid;place-items:center;margin:0 auto 24px;animation:pop .5s cubic-bezier(.2,1.4,.3,1)}
@keyframes pop{from{transform:scale(.5);opacity:0}}

.stats4{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.stat{padding:20px}
.stat .l{font-size:11px;font-family:var(--font-m);letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.stat .v{font-family:var(--font-d);font-size:32px;font-weight:700;color:var(--gold);letter-spacing:-.02em;line-height:1}
.stat .d{font-size:12px;color:var(--muted);margin-top:8px;font-family:var(--font-m)}
.stat .d.pos{color:var(--green)}

.enter{animation:slide .32s ease-out}
@keyframes slide{from{opacity:0;transform:translateY(8px)}}

.bottom{display:flex;gap:10px;margin-top:32px}

.avatar{width:44px;height:44px;border-radius:12px;background:color-mix(in srgb,var(--gold) 20%,transparent);color:var(--gold);display:grid;place-items:center;font-weight:700;font-family:var(--font-d)}
.company-name{display:flex;align-items:center;gap:14px}

.section-head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:20px}
.section-head h3{font-size:14px;font-weight:600;white-space:nowrap;min-width:0}
.section-head .note{font-size:12px;color:var(--dim);font-family:var(--font-m);flex-shrink:0;white-space:nowrap}

.ta{width:100%;background:var(--input);border:1px solid var(--panel-border);border-radius:12px;padding:14px 16px;color:var(--text);font-family:var(--font-b);font-size:15px;resize:vertical;outline:none;line-height:1.5}
.ta:focus{border-color:color-mix(in srgb,var(--gold) 40%,var(--panel-border))}

.chat{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.msg{padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.55;max-width:85%;animation:slide .24s ease-out}
.msg.me{align-self:flex-end;background:var(--gold);color:#1a1405}
.msg.ai{align-self:flex-start;background:var(--input);border:1px solid var(--panel-border)}
.msg.ai.thinking{color:var(--dim);font-style:italic}
.msg.ai.error{color:var(--red);border-color:color-mix(in srgb,var(--red) 30%,transparent)}
.sugg{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.sugg button{background:var(--input);border:1px solid var(--panel-border);border-radius:999px;padding:6px 12px;color:var(--muted);font-size:12px;font-family:inherit;cursor:pointer}
.sugg button:hover{color:var(--text);background:var(--hover)}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);z-index:40;display:grid;place-items:center;padding:24px;animation:fade .2s}
@keyframes fade{from{opacity:0}}
.modal{width:100%;max-width:680px;max-height:88vh;overflow:auto;background:var(--bg);border:1px solid var(--panel-border);border-radius:20px;padding:28px 28px 24px;animation:slide .24s ease-out}
.modal-head{display:flex;justify-content:space-between;align-items:start;margin-bottom:4px;gap:16px}
.modal-x{background:transparent;border:0;color:var(--dim);font-size:22px;cursor:pointer;padding:4px 10px;line-height:1;font-family:inherit}
.modal-x:hover{color:var(--text)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:12px 20px;border-radius:12px;font-size:14px;z-index:50;display:flex;gap:14px;align-items:center;animation:slide .24s}
.toast button{background:transparent;border:0;color:var(--bg);text-decoration:underline;cursor:pointer;font-family:inherit;font-size:14px;padding:0}

.ver-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:12px;padding:12px 0;border-bottom:1px dashed var(--panel-border);align-items:center;font-size:13px}
.ver-row:last-child{border-bottom:0}
.ver-row .when{color:var(--muted);font-family:var(--font-m);font-size:12px}

/* ===== Dashboard (PDF-style two-column layout) ===== */
.dash{display:grid;grid-template-columns:340px 1fr;min-height:calc(100vh - 64px);max-width:1440px;margin:0 auto}
.dash-side{border-right:1px solid var(--panel-border);background:var(--bg);padding:0;display:flex;flex-direction:column}
.dash-side-head{padding:24px 24px 14px;font-size:11px;font-family:var(--font-m);letter-spacing:.14em;text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--panel-border)}
.dash-list{display:flex;flex-direction:column;flex:1;overflow-y:auto}
.dash-card{padding:18px 22px 18px 24px;border-bottom:1px solid var(--panel-border);cursor:pointer;position:relative;transition:background .15s}
.dash-card:hover{background:var(--hover)}
.dash-card.active{background:color-mix(in srgb,var(--gold) 6%,var(--bg))}
.dash-card.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold)}
.dash-card-co{font-family:var(--font-d);font-weight:700;font-size:15px;letter-spacing:-.005em;color:var(--text);margin-bottom:4px}
.dash-card-sum{font-size:13px;color:var(--muted);margin-bottom:10px;line-height:1.4}
.dash-card-meta{display:flex;align-items:center;justify-content:space-between;gap:10px}
.dash-card-time{font-family:var(--font-m);font-size:11px;color:var(--dim)}

.dash-pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11px;font-family:var(--font-m);font-weight:500;letter-spacing:.02em}
.dash-pill.review{background:color-mix(in srgb,var(--purple) 16%,transparent);color:var(--purple)}
.dash-pill.pricing{background:color-mix(in srgb,var(--gold) 18%,transparent);color:var(--gold)}
.dash-pill.sent{background:color-mix(in srgb,var(--green) 18%,transparent);color:var(--green)}
.dash-pill.new{background:color-mix(in srgb,var(--blue) 18%,transparent);color:var(--blue)}
.dash-pill.awaiting{background:color-mix(in srgb,var(--gold) 14%,transparent);color:var(--gold);padding:5px 14px;font-size:12px}

.dash-main{padding:32px 40px;overflow-y:auto;background:var(--panel)}
[data-theme="light"] .dash-main{background:#ffffff}
.dash-feed-head{display:flex;align-items:center;justify-content:space-between;gap:20px;padding-bottom:24px;margin-bottom:20px;border-bottom:1px solid var(--panel-border)}
.dash-feed-head h2{font-family:var(--font-d);font-weight:700;font-size:20px;letter-spacing:-.01em;margin:0}
.dash-events{display:flex;flex-direction:column;gap:16px}

.feed-event{display:grid;grid-template-columns:44px 1fr;gap:14px;align-items:flex-start}
.feed-avatar{width:40px;height:40px;border-radius:999px;display:grid;place-items:center;font-family:var(--font-d);font-weight:700;font-size:13px;letter-spacing:.02em;flex-shrink:0;margin-top:2px}
.feed-avatar.purple{background:color-mix(in srgb,var(--purple) 22%,transparent);color:var(--purple)}
.feed-avatar.ai{background:linear-gradient(135deg,color-mix(in srgb,var(--purple) 30%,transparent),color-mix(in srgb,var(--gold) 25%,transparent));color:var(--purple)}
.feed-avatar.sy{background:color-mix(in srgb,var(--muted) 22%,transparent);color:var(--muted)}

.feed-content{background:color-mix(in srgb,var(--text) 3%,transparent);border:1px solid var(--panel-border);border-radius:12px;padding:14px 18px}
[data-theme="light"] .feed-content{background:#fafaf7;border-color:rgba(28,25,20,0.08)}
.feed-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.feed-name{font-weight:600;font-size:14px;color:var(--text)}
.feed-badge{font-family:var(--font-m);font-size:10px;font-weight:600;letter-spacing:.08em;padding:2px 8px;border-radius:4px;text-transform:uppercase}
.feed-badge.parsed{background:color-mix(in srgb,var(--purple) 18%,transparent);color:var(--purple)}
.feed-badge.sent{background:color-mix(in srgb,var(--green) 18%,transparent);color:var(--green)}
.feed-badge.pricing{background:color-mix(in srgb,var(--gold) 22%,transparent);color:var(--gold)}
.feed-time{font-family:var(--font-m);font-size:11px;color:var(--dim);margin-left:auto}
.feed-body{font-size:13.5px;line-height:1.6;color:var(--text)}
.feed-body > div{margin-bottom:4px}
.feed-body > div:last-child{margin-bottom:0}
.feed-body b{font-weight:600}

.feed-buttons{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}

.dash-empty{display:grid;place-items:center;height:100%;color:var(--dim);font-size:14px;padding:40px;text-align:center}
.dash-empty-icon{margin-bottom:14px;opacity:.5}

/* ===== PDF Preview Modal ===== */
.pdf-modal{max-width:820px;background:transparent;border:0;padding:0;box-shadow:none;position:relative}
.pdf-modal-x{position:absolute;top:-44px;right:0;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;width:36px;height:36px;border-radius:999px;cursor:pointer;font-size:18px;line-height:1;display:grid;place-items:center;font-family:inherit;backdrop-filter:blur(4px)}
.pdf-modal-x:hover{background:rgba(255,255,255,0.2)}
.pdf-paper{background:#ffffff;color:#0f172a;padding:48px 56px 40px;font-family:Georgia,'Times New Roman',serif;line-height:1.55;font-size:13.5px;border-radius:4px;box-shadow:0 24px 80px rgba(0,0,0,.45)}
.pdf-paper p{margin:0 0 12px 0;color:#1e293b}
.pdf-paper-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #0f172a;padding-bottom:14px;margin-bottom:28px;font-family:'Helvetica Neue',Arial,sans-serif}
.pdf-paper-head .left h1{font-family:'Helvetica Neue',Arial,sans-serif;font-size:22px;font-weight:700;letter-spacing:-.01em;margin:0;color:#0f172a;line-height:1.2}
.pdf-paper-head .left .sub{font-size:12px;color:#475569;margin-top:3px;font-family:'Helvetica Neue',Arial,sans-serif}
.pdf-paper-head .right{text-align:right;font-family:'Helvetica Neue',Arial,sans-serif}
.pdf-paper-head .right .label{font-size:11px;color:#64748b;letter-spacing:.08em;text-transform:uppercase;font-weight:500}
.pdf-paper-head .right .num{font-size:15px;font-weight:600;font-family:'Courier New',monospace;margin-top:4px;color:#0f172a;letter-spacing:.02em}
.pdf-paper-table{width:100%;border-collapse:collapse;margin:24px 0 0 0;font-family:'Helvetica Neue',Arial,sans-serif;font-size:13px}
.pdf-paper-table thead th{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#64748b;text-align:left;padding:8px 0;border-bottom:1px solid #cbd5e1;font-weight:600}
.pdf-paper-table thead th.amt{text-align:right}
.pdf-paper-table tbody td{padding:11px 0;border-bottom:1px solid #e2e8f0;vertical-align:top;color:#1e293b}
.pdf-paper-table tbody td.amt{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
.pdf-paper-table tbody td.discount{color:#16a34a}
.pdf-paper-total{display:flex;justify-content:space-between;align-items:baseline;padding:14px 0 4px;border-top:2px solid #0f172a;font-weight:700;font-size:15px;font-family:'Helvetica Neue',Arial,sans-serif;margin-top:0}
.pdf-paper-total .label{font-size:13px;font-weight:600}
.pdf-paper-total .val{font-variant-numeric:tabular-nums}
.pdf-paper-foot{margin-top:32px;padding-top:14px;border-top:1px solid #e2e8f0;color:#64748b;font-size:11px;line-height:1.5;text-align:center;font-family:'Helvetica Neue',Arial,sans-serif;letter-spacing:.02em}
.pdf-paper-sig{margin-top:28px;font-size:13px;line-height:1.55;color:#1e293b}
.pdf-paper-sig b{color:#0f172a}
</style>
</head>
